version: "3.8"

services:
  wutong-defense:
    build: .
    ports:
      - "80:80"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./Datasets:/app/Datasets:ro
      - ./output:/app/output:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
